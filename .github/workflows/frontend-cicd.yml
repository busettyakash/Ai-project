name: Frontend CI/CD

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build Project
        run: npm run build
        
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and push Docker Image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/salesshop-frontend:latest

      - name: Diagnostic - Check ArgoCD Connectivity
        run: |
          echo "Checking connection to ${{ secrets.ARGOCD_SERVER }}..."
          curl -v -k "http://${{ secrets.ARGOCD_SERVER }}/" || echo "HTTP Check failed"
          curl -v -k "https://${{ secrets.ARGOCD_SERVER }}/" || echo "HTTPS Check failed"

      - name: Sync ArgoCD Application
        if: github.event_name != 'pull_request'
        uses: clowdhaus/argo-cd-action/@main
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_USERNAME: ${{ secrets.ARGOCD_USERNAME }}
          ARGOCD_PASSWORD: ${{ secrets.ARGOCD_PASSWORD }}
          ARGOCD_OPTS: --insecure
        with:
          command: app sync salesshop-frontend
