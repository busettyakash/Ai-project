apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: salesshop-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/busettyakash/Ai-project.git
    targetRevision: HEAD
    path: k8s/frontend
  destination:
    server: https://kubernetes.default.svc
    namespace: salesshop-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
