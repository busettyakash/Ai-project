databaseChangeLog:
  - changeSet:
      id: 003-create-products-table
      author: salesshop
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: price
                  type: DECIMAL(12,2)
                  constraints:
                    nullable: false
              - column:
                  name: sku
                  type: VARCHAR(50)
              - column:
                  name: stock_quantity
                  type: INT
                  defaultValueNumeric: 0
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_products_user
                    references: users(id)
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
        - createIndex:
            indexName: idx_products_user_id
            tableName: products
            columns:
              - column:
                  name: user_id
