server.port=8080

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/appdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:akash}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:A2003189}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# JWT
app.jwt.secret=${APP_JWT_SECRET:salesshop_jwt_secret_key_2026_spring_boot}
app.jwt.expiration=${APP_JWT_EXPIRATION:604800000}

# CORS
app.cors.allowed-origins=http://localhost:5173
